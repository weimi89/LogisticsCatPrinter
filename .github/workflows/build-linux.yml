name: Build Linux Packages

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (.deb + .AppImage) on Ubuntu 20.04
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
      options: --privileged
    env:
      DEBIAN_FRONTEND: noninteractive
      TZ: Asia/Taipei
      APPIMAGE_EXTRACT_AND_RUN: '1'

    steps:
      - name: Install base + Tauri build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl ca-certificates git wget file sudo tzdata \
            build-essential pkg-config \
            libssl-dev \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            fuse libfuse2 \
            xdg-utils desktop-file-utils
          ln -fs /usr/share/zoneinfo/$TZ /etc/localtime
          echo $TZ > /etc/timezone

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install tauri-cli v1
        run: cargo install tauri-cli --version '^1' --locked

      - name: Build + bundle (.deb + .AppImage)
        working-directory: src-tauri
        run: cargo tauri build --bundles deb,appimage

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp src-tauri/target/release/bundle/deb/*.deb dist/
          cp src-tauri/target/release/bundle/appimage/*.AppImage dist/
          echo "---"
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LogisticsCatPrinter-linux
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.AppImage
          fail_on_unmatched_files: true
