name: Build Linux Binary

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (Ubuntu 22.04 amd64)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build release binary
        working-directory: src-tauri
        run: cargo build --release

      - name: Show binary info
        run: |
          ls -lh src-tauri/target/release/gkconfig-ui
          file src-tauri/target/release/gkconfig-ui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gkconfig-ui-linux-x64
          path: src-tauri/target/release/gkconfig-ui
          if-no-files-found: error
          retention-days: 30

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/gkconfig-ui
          fail_on_unmatched_files: true
